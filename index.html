<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHORTS MAKER · AI POWERED</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e12;--panel:#18181c;--border:#2a2a32;--accent:#e04fff;--accent2:#7c3aff;--text:#e8e8f0;--muted:#6b6b80;--green:#22c55e;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-size:15px;font-weight:800;letter-spacing:.06em;color:#fff}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff}
.top-actions{display:flex;align-items:center;gap:10px}
.run-btn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0 18px;height:34px;font-size:13px;font-weight:800;cursor:pointer;border-radius:6px}
.run-btn:disabled{opacity:.3;cursor:not-allowed}
.run-btn:hover:not(:disabled){opacity:.88}
.body{display:flex;flex:1;overflow:hidden}
.left{width:270px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:0}
.sec{padding:14px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.upload{border:1.5px dashed var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;position:relative;transition:all .2s;margin-bottom:6px}
.upload:hover{border-color:var(--accent);background:rgba(224,79,255,.04)}
.upload.ok{border-color:var(--green);border-style:solid;background:rgba(34,197,94,.05)}
.upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-ico{font-size:18px;margin-bottom:3px}
.upload-lbl{font-size:11px;color:var(--muted)}
.upload-lbl strong{display:block;font-size:10px;color:#aaa}
.fname{font-size:10px;color:var(--green);margin-top:3px;word-break:break-all}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lbl{font-size:12px;color:var(--text)}
.sub{font-size:10px;color:var(--muted)}
.tog{width:34px;height:18px;background:var(--border);border-radius:9px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.tog.on::after{left:18px}
.rng-hd{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px}
.rng-val{color:var(--accent);font-weight:600}
input[type=range]{width:100%;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none;margin-bottom:10px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.api-inp{width:100%;background:#111;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:11px;outline:none;font-family:monospace}
.api-inp:focus{border-color:var(--accent)}
.api-note{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5}
.center{flex:1;display:flex;flex-direction:column;overflow:hidden}
.log-area{flex:1;padding:16px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.7}
.log-line{margin-bottom:2px}
.log-line.info{color:var(--muted)}
.log-line.ok{color:var(--green)}
.log-line.err{color:var(--red)}
.log-line.ai{color:#c084fc}
.log-line.bold{color:#fff;font-weight:700}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center}
.empty-ico{font-size:40px;opacity:.2}
.empty-msg{font-size:14px;font-weight:600;color:var(--text)}
.empty-sub{font-size:12px;color:var(--muted);max-width:300px;line-height:1.6}
.dl-btn{background:var(--green);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
.dl-btn:hover{opacity:.88}
select{width:100%;background:#111;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:11px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-text">SHORTS MAKER</div>
    <div class="badge">AI POWERED</div>
  </div>
  <div class="top-actions">
    <span id="statusTxt" style="font-size:11px;color:var(--muted)"></span>
    <button class="run-btn" id="runBtn" onclick="run()" disabled>▶ AI 쇼츠 편집</button>
  </div>
</div>

<div class="body">
  <div class="left">
    <div class="sec">
      <div class="sec-title">📁 파일</div>
      <div class="upload" id="vz">
        <input type="file" accept=".vrew" id="vf" onchange="loadVrew(this)">
        <div class="upload-ico">📁</div>
        <div class="upload-lbl">Vrew 파일<strong>.vrew</strong></div>
        <div class="fname" id="vfn"></div>
      </div>
      <div class="upload" id="sz">
        <input type="file" accept=".txt,.md" id="sf" onchange="loadScript(this)">
        <div class="upload-ico">📄</div>
        <div class="upload-lbl">대본 파일<strong>.txt (선택)</strong></div>
        <div class="fname" id="sfn"></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">✂️ 편집 설정</div>
      <div class="rng-hd"><span>최대 길이</span><span class="rng-val" id="lv">60초</span></div>
      <input type="range" min="30" max="90" value="60" step="5" oninput="document.getElementById('lv').textContent=this.value+'초'">
      <div class="row"><div><div class="lbl">인트로 포함</div><div class="sub">간략하게</div></div><div class="tog on" onclick="this.classList.toggle('on')"></div></div>
      <div class="row"><div><div class="lbl">아웃트로 제거</div></div><div class="tog on" onclick="this.classList.toggle('on')"></div></div>
      <div class="row"><div><div class="lbl">문구 중간 컷 허용</div></div><div class="tog on" onclick="this.classList.toggle('on')"></div></div>
    </div>

    <div class="sec">
      <div class="sec-title">📐 화면 비율</div>
      <select id="ratio">
        <option value="4:5">인스타그램 4:5</option>
        <option value="9:16">쇼츠 9:16</option>
        <option value="1:1">정방형 1:1</option>
        <option value="16:9">원본 16:9</option>
      </select>
    </div>

    <div class="sec">
      <div class="sec-title">🔑 Anthropic API 키</div>
      <input type="password" class="api-inp" id="apiKey" placeholder="sk-ant-..." oninput="checkReady()">
      <div class="api-note">키는 브라우저에만 저장 · 서버 전송 없음<br><a href="https://console.anthropic.com" target="_blank" style="color:var(--accent)">console.anthropic.com</a>에서 발급</div>
    </div>
  </div>

  <div class="center">
    <div class="empty" id="emptyState">
      <div class="empty-ico">✂️</div>
      <div class="empty-msg">준비 완료</div>
      <div class="empty-sub">.vrew 파일 업로드 후<br>API 키 입력하고 시작하세요</div>
    </div>
    <div class="log-area" id="logArea" style="display:none"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let state = {vrew:null, script:'', vrewName:'', result:null};

function loadVrew(inp) {
  const f = inp.files[0]; if(!f) return;
  state.vrewName = f.name;
  const r = new FileReader();
  r.onload = e => { state.vrew = e.target.result; document.getElementById('vz').classList.add('ok'); document.getElementById('vfn').textContent = f.name; checkReady(); };
  r.readAsArrayBuffer(f);
}

function loadScript(inp) {
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => { state.script = e.target.result; document.getElementById('sz').classList.add('ok'); document.getElementById('sfn').textContent = f.name; };
  r.readAsText(f);
}

function checkReady() {
  const btn = document.getElementById('runBtn');
  const key = document.getElementById('apiKey').value.trim();
  btn.disabled = !(state.vrew && key.startsWith('sk-ant'));
  document.getElementById('statusTxt').textContent = state.vrew ? (key ? '준비됨' : 'API 키 입력 필요') : '파일 없음';
}

function log(msg, cls='info') {
  const area = document.getElementById('logArea');
  const el = document.createElement('div');
  el.className = 'log-line ' + cls;
  el.textContent = msg;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function getTog(els, idx) { return els[idx].classList.contains('on'); }

async function run() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const maxLen = parseInt(document.querySelector('input[type=range]').value);
  const ratio = document.getElementById('ratio').value;
  const togs = document.querySelectorAll('.tog');
  const intro = getTog(togs,0);
  const noOutro = getTog(togs,1);
  const midCut = getTog(togs,2);

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('logArea').style.display = 'block';
  document.getElementById('logArea').innerHTML = '';
  document.getElementById('runBtn').disabled = true;

  try {
    log('📦 .vrew 파일 파싱 중...', 'info');
    const zip = await JSZip.loadAsync(state.vrew);

    // project.json 추출 (중복 있으면 마지막)
    const pjFiles = [];
    zip.forEach((path, f) => { if(path === 'project.json') pjFiles.push(f); });
    const pjContent = await pjFiles[pjFiles.length-1].async('string');
    const data = JSON.parse(pjContent);

    const clips = data.transcript.clips;
    log(`✓ 클립 ${clips.length}개 발견`, 'ok');

    // 클립 텍스트 추출
    function ct(c) { return (c.words||[]).filter(w=>w.type===0&&w.text).map(w=>w.text).join(' '); }
    const clipList = clips.map((c,i) => `[${c.id}] ${ct(c)}`).join('\n');

    log(`🤖 Claude에 편집 요청 중 (${maxLen}초 이내)...`, 'ai');

    const sysPrompt = `당신은 유튜브/인스타그램 쇼츠 영상 편집 전문가입니다. 주어진 클립 목록에서 쇼츠로 만들 클립들을 선택하세요.

규칙:
- 최대 ${maxLen}초 이내 (클립 1개 평균 2초)
- ${intro ? '인트로는 3~5클립 정도 간략하게 포함' : '인트로 제외'}
- ${noOutro ? '아웃트로(마무리 인사) 제외' : '아웃트로 포함'}
- ${midCut ? '문장 중간에서 자를 수 있음' : '문장이 끊기지 않는 곳에서만 자를 것'}
- 자연스러운 흐름 유지, 문맥 이어지게 선택
- 각 제품 섹션은 핵심 설명만
${state.script ? `\n대본 정보:\n${state.script.slice(0,1000)}` : ''}

응답 형식: 선택한 클립 ID만 줄바꿈으로 나열. 다른 설명 없이 ID만.
예시:
abc123
def456
ghi789`;

    const userMsg = `전체 클립 목록:\n${clipList}\n\n위 클립들 중 쇼츠용으로 선택할 클립 ID만 나열해주세요.`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        system: sysPrompt,
        messages: [{role:'user', content: userMsg}]
      })
    });

    if(!res.ok) {
      const err = await res.text();
      throw new Error('API 오류: ' + res.status + ' ' + err.slice(0,200));
    }

    const aiData = await res.json();
    const aiText = aiData.content[0].text.trim();
    const selectedIds = new Set(aiText.split('\n').map(s=>s.trim()).filter(Boolean));
    log(`✓ Claude가 ${selectedIds.size}개 클립 선택`, 'ok');
    log(`선택된 클립: ${[...selectedIds].slice(0,5).join(', ')}...`, 'ai');

    log('✂️ 클립 필터링 적용 중...', 'info');
    data.transcript.clips = clips.filter(c => selectedIds.has(c.id));
    if(data.props && data.props.originalClips) {
      data.props.originalClips = data.props.originalClips.filter(c => {
        const words = c.words || [];
        return words.some(w => selectedIds.has(w.id)) || data.transcript.clips.some(tc => tc.sceneId === c.sceneId);
      });
    }
    log(`✓ ${data.transcript.clips.length}개 클립으로 편집 완료`, 'ok');

    log('📦 새 .vrew 파일 생성 중...', 'info');
    const newZip = new JSZip();
    zip.forEach((path, f) => {
      if(path !== 'project.json') newZip.file(path, f.async('arraybuffer'));
    });
    newZip.file('project.json', JSON.stringify(data, null, 0));

    const blob = await newZip.generateAsync({type:'blob', compression:'DEFLATE'});
    state.result = {blob, name: state.vrewName.replace('.vrew','') + '_쇼츠.vrew'};

    log('', '');
    log('🎉 완료! 아래 버튼으로 다운로드하세요.', 'bold');

    const dlBtn = document.createElement('button');
    dlBtn.className = 'dl-btn';
    dlBtn.textContent = '⬇ ' + state.result.name + ' 다운로드';
    dlBtn.onclick = () => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = state.result.name;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
    document.getElementById('logArea').appendChild(dlBtn);

  } catch(e) {
    log('❌ 오류: ' + e.message, 'err');
    console.error(e);
  }

  document.getElementById('runBtn').disabled = false;
  checkReady();
}

// API 키 로컬 저장
window.onload = () => {
  const saved = localStorage.getItem('anthropic_key');
  if(saved) { document.getElementById('apiKey').value = saved; checkReady(); }
};
document.getElementById('apiKey').addEventListener('change', e => {
  if(e.target.value) localStorage.setItem('anthropic_key', e.target.value);
});
</script>
</body>
</html>
